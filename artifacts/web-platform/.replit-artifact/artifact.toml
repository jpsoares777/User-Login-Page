kind = "web"
previewPath = "/"
title = "Plataforma Web"
version = "1.0.0"
id = "artifacts/web-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21596

[services.development]
run = "pnpm --filter @workspace/web-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-platform", "run", "build" ]
publicDir = "artifacts/web-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21596"
BASE_PATH = "/"
